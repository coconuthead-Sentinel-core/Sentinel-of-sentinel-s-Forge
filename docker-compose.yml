version: '3.9'
services:
  app:
    build: .
    container_name: qnf_app
    environment:
      - ENVIRONMENT=production
      - MOCK_AI=false
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_RPM=600
      - RATE_LIMIT_BURST=120
      # REQUIRED: Set your API key
      - API_KEY=${API_KEY:?Set API_KEY in .env or environment}
      # REQUIRED: Set a production JWT secret
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env or environment}
      # REQUIRED: Set allowed CORS origins
      - CORS_ORIGINS=${CORS_ORIGINS:-https://your-domain.com}
      # REQUIRED: Configure Stripe billing runtime values
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:?Set STRIPE_SECRET_KEY in .env or environment}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:?Set STRIPE_WEBHOOK_SECRET in .env or environment}
      - STRIPE_PRICE_ID_STARTER=${STRIPE_PRICE_ID_STARTER:?Set STRIPE_PRICE_ID_STARTER in .env or environment}
      - STRIPE_PRICE_ID_PRO=${STRIPE_PRICE_ID_PRO:?Set STRIPE_PRICE_ID_PRO in .env or environment}
      - STRIPE_PRICE_ID_ENTERPRISE=${STRIPE_PRICE_ID_ENTERPRISE:?Set STRIPE_PRICE_ID_ENTERPRISE in .env or environment}
      # AI Provider (Azure OpenAI)
      - AOAI_ENDPOINT=${AOAI_ENDPOINT:-}
      - AOAI_KEY=${AOAI_KEY:-}
      # Cosmos DB
      - COSMOS_ENDPOINT=${COSMOS_ENDPOINT:-}
      - COSMOS_KEY=${COSMOS_KEY:-}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: qnf_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/usr/share/nginx/html/frontend:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
